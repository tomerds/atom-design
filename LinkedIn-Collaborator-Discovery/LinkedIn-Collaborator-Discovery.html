<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atom — Finding the Right Collaborator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/cal-sans" rel="stylesheet">
<style>
  :root {
    --atom-red: #ff3338;
    --atom-orange: #fe6400;
    --bg: #ffffff;
    --text: #000000;
    --gray-dark: #333333;
    --gray-light: #d9d9d9;
    --font-title: "Cal Sans", system-ui, sans-serif;
    --font-body: "DM Sans", system-ui, sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #f2f2f2;
    font-family: var(--font-body);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 0;
  }

  .poster {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Subtle background pattern */
  .poster::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background:
      radial-gradient(circle at 0% 0%, rgba(255, 51, 56, 0.05) 0%, transparent 55%),
      radial-gradient(circle at 100% 100%, rgba(254, 100, 0, 0.05) 0%, transparent 55%);
    pointer-events: none;
  }

  .top-bar {
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, var(--atom-red), var(--atom-orange));
    flex-shrink: 0;
  }

  .header {
    padding: 40px 56px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }

  .header img {
    height: 36px;
  }

  .header-tag {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--atom-red);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .title-section {
    padding: 40px 56px 0;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }

  .title-section h1 {
    font-family: var(--font-title);
    font-size: 56px;
    line-height: 1.08;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .title-section h1 span {
    background: linear-gradient(90deg, var(--atom-red), var(--atom-orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 18px;
    font-size: 19px;
    color: #555;
    font-weight: 400;
    line-height: 1.5;
    max-width: 780px;
  }

  /* Network area */
  .network {
    flex: 1;
    position: relative;
    margin: 0 24px;
    z-index: 1;
  }

  .network svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Bottom legend + CTA */
  .bottom-section {
    padding: 0 56px 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }

  .legend {
    display: flex;
    gap: 28px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #555;
  }

  .legend-swatch {
    width: 36px;
    height: 0;
    border-top: 2.5px solid var(--atom-red);
  }

  .legend-swatch.dashed {
    border-top: 2.5px dashed #bbb;
  }

  .bottom-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    background: linear-gradient(135deg, var(--atom-red), var(--atom-orange));
    color: white;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    border: none;
    letter-spacing: 0.01em;
  }

  .bottom-cta svg {
    width: 16px;
    height: 16px;
  }
</style>
</head>
<body>
<div class="poster">
  <div class="top-bar"></div>

  <!-- Header -->
  <div class="header">
    <img src="../assets/atom-wordmark.png" alt="Atom">
    <div class="header-tag">Collaboration Discovery</div>
  </div>

  <!-- Title -->
  <div class="title-section">
    <h1>How do you find the right <span>collaborator</span> for a proposal?</h1>
    <p class="subtitle">Most of the time, it comes down to who you already know. That&rsquo;s not a system — that&rsquo;s luck.</p>
  </div>

  <!-- Network diagram -->
  <div class="network">
    <svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff3338"/>
          <stop offset="100%" stop-color="#fe6400"/>
        </linearGradient>
        <linearGradient id="knownLine" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#ff3338" stop-opacity="1"/>
          <stop offset="100%" stop-color="#fe6400" stop-opacity="1"/>
        </linearGradient>
        <radialGradient id="haloGrad" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stop-color="#ff3338" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#fe6400" stop-opacity="0"/>
        </radialGradient>
        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="10" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Halo behind center -->
      <circle cx="500" cy="260" r="200" fill="url(#haloGrad)"/>

      <!-- HIDDEN (dashed) connections: faded potential collaborators -->
      <!-- Outer ring positions (x, y) -->
      <!-- We'll draw dashed lines from center to outer nodes -->
      <g stroke="#c9c9c9" stroke-width="1.4" stroke-dasharray="4 5" fill="none" opacity="0.85">
        <line x1="500" y1="260" x2="120" y2="90"/>
        <line x1="500" y1="260" x2="220" y2="60"/>
        <line x1="500" y1="260" x2="360" y2="50"/>
        <line x1="500" y1="260" x2="640" y2="45"/>
        <line x1="500" y1="260" x2="780" y2="65"/>
        <line x1="500" y1="260" x2="890" y2="120"/>
        <line x1="500" y1="260" x2="940" y2="230"/>
        <line x1="500" y1="260" x2="920" y2="350"/>
        <line x1="500" y1="260" x2="860" y2="450"/>
        <line x1="500" y1="260" x2="720" y2="490"/>
        <line x1="500" y1="260" x2="560" y2="495"/>
        <line x1="500" y1="260" x2="400" y2="490"/>
        <line x1="500" y1="260" x2="260" y2="475"/>
        <line x1="500" y1="260" x2="140" y2="430"/>
        <line x1="500" y1="260" x2="80" y2="340"/>
        <line x1="500" y1="260" x2="60" y2="220"/>
        <!-- secondary connections (node-to-node, suggesting wider network) -->
        <line x1="120" y1="90" x2="220" y2="60" opacity="0.6"/>
        <line x1="640" y1="45" x2="780" y2="65" opacity="0.6"/>
        <line x1="890" y1="120" x2="940" y2="230" opacity="0.6"/>
        <line x1="920" y1="350" x2="860" y2="450" opacity="0.6"/>
        <line x1="260" y1="475" x2="140" y2="430" opacity="0.6"/>
        <line x1="80" y1="340" x2="60" y2="220" opacity="0.6"/>
        <line x1="220" y1="60" x2="360" y2="50" opacity="0.6"/>
        <line x1="720" y1="490" x2="560" y2="495" opacity="0.6"/>
      </g>

      <!-- KNOWN (solid) connections: the few you already have -->
      <g stroke="url(#knownLine)" stroke-width="2.5" fill="none" stroke-linecap="round">
        <line x1="500" y1="260" x2="310" y2="170"/>
        <line x1="500" y1="260" x2="700" y2="160"/>
        <line x1="500" y1="260" x2="720" y2="360"/>
        <line x1="500" y1="260" x2="330" y2="370"/>
      </g>

      <!-- Hidden nodes (faded, outer) -->
      <g>
        <!-- Ring of small faded circles -->
        <circle cx="120" cy="90" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="220" cy="60" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="360" cy="50" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="640" cy="45" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="780" cy="65" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="890" cy="120" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="940" cy="230" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="920" cy="350" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="860" cy="450" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="720" cy="490" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="560" cy="495" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="400" cy="490" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="260" cy="475" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="140" cy="430" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="80" cy="340" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>
        <circle cx="60" cy="220" r="11" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.5"/>

        <!-- Small dot inside each, to suggest a "person" silhouette -->
        <g fill="#c9c9c9">
          <circle cx="120" cy="87" r="3"/>
          <circle cx="220" cy="57" r="3"/>
          <circle cx="360" cy="47" r="3"/>
          <circle cx="640" cy="42" r="3"/>
          <circle cx="780" cy="62" r="3"/>
          <circle cx="890" cy="117" r="3"/>
          <circle cx="940" cy="227" r="3"/>
          <circle cx="920" cy="347" r="3"/>
          <circle cx="860" cy="447" r="3"/>
          <circle cx="720" cy="487" r="3"/>
          <circle cx="560" cy="492" r="3"/>
          <circle cx="400" cy="487" r="3"/>
          <circle cx="260" cy="472" r="3"/>
          <circle cx="140" cy="427" r="3"/>
          <circle cx="80" cy="337" r="3"/>
          <circle cx="60" cy="217" r="3"/>
        </g>
      </g>

      <!-- Known nodes (solid, brand-colored) -->
      <g>
        <circle cx="310" cy="170" r="18" fill="#ffffff" stroke="#ff3338" stroke-width="3"/>
        <circle cx="310" cy="167" r="4.5" fill="#ff3338"/>
        <path d="M 300 180 a 10 8 0 0 1 20 0" fill="#ff3338"/>

        <circle cx="700" cy="160" r="18" fill="#ffffff" stroke="#fe6400" stroke-width="3"/>
        <circle cx="700" cy="157" r="4.5" fill="#fe6400"/>
        <path d="M 690 170 a 10 8 0 0 1 20 0" fill="#fe6400"/>

        <circle cx="720" cy="360" r="18" fill="#ffffff" stroke="#ff3338" stroke-width="3"/>
        <circle cx="720" cy="357" r="4.5" fill="#ff3338"/>
        <path d="M 710 370 a 10 8 0 0 1 20 0" fill="#ff3338"/>

        <circle cx="330" cy="370" r="18" fill="#ffffff" stroke="#fe6400" stroke-width="3"/>
        <circle cx="330" cy="367" r="4.5" fill="#fe6400"/>
        <path d="M 320 380 a 10 8 0 0 1 20 0" fill="#fe6400"/>
      </g>

      <!-- CENTER node: YOU -->
      <g>
        <circle cx="500" cy="260" r="46" fill="url(#centerGrad)" filter="url(#softGlow)"/>
        <circle cx="500" cy="260" r="46" fill="url(#centerGrad)"/>
        <circle cx="500" cy="250" r="11" fill="#ffffff"/>
        <path d="M 478 283 a 22 18 0 0 1 44 0" fill="#ffffff"/>
      </g>

      <!-- Label: "You" -->
      <text x="500" y="340" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="15" font-weight="700" fill="#333" letter-spacing="0.06em">YOU</text>

      <!-- Annotation: hidden collaborators -->
      <g>
        <text x="40" y="505" font-family="DM Sans, sans-serif" font-size="14" font-weight="500" fill="#888">
          <tspan font-weight="700" fill="#666">Hidden potential:</tspan> researchers working on adjacent problems, complementary methods, already-funded spaces
        </text>
      </g>
    </svg>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="legend">
      <div class="legend-item">
        <span class="legend-swatch"></span>
        Who you know
      </div>
      <div class="legend-item">
        <span class="legend-swatch dashed"></span>
        Who you&rsquo;re missing
      </div>
    </div>
    <div class="bottom-cta">
      Let&rsquo;s close the gap
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
